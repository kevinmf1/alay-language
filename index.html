<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter Bahasa Alay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Converter Bahasa Alay</h1>
        <div class="mode-toggle">
            <button id="modeNormalToAlay" class="mode-btn active">Normal → Alay</button>
            <button id="modeAlayToNormal" class="mode-btn">Alay → Normal</button>
        </div>
        <textarea id="inputText" placeholder="Tulis kalimat di sini..."></textarea>
        <button id="convertBtn">Convert ke Alay</button>
        <h2>Hasil:</h2>
        <textarea id="outputText" readonly></textarea>
        <button id="copyBtn">Copy Hasil</button>
    </div>
    <footer>
        <p>© 2026 Converter Bahasa Alay</p>
        <p><a href="https://github.com/kevinmf1/alay-language" target="_blank">GitHub Repository</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
